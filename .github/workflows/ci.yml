name: CI — Build, Test & Push

# ─────────────────────────────────────────────────────────────────
# Se dispara en:
#   • Push a main o develop
#   • Pull Request hacia main
# ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ───────────────────────────────────────────────
  # JOB 1 — Tests del backend con H2 (sin MySQL)
  # ───────────────────────────────────────────────
  backend-tests:
    name: Backend — Tests unitarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Genera claves RSA temporales para que Spring Security pueda arrancar
      - name: Generar claves RSA (CI)
        run: |
          mkdir -p APIZum/APIZum/src/main/resources/certs
          openssl genrsa -out private_key.pem 2048
          openssl rsa -in private_key.pem -pubout -out public_key.pem
          # Formato PKCS#8 que espera Spring
          openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt \
            -in private_key.pem \
            -out APIZum/APIZum/src/main/resources/certs/private.pem
          cp public_key.pem APIZum/APIZum/src/main/resources/certs/public.pem

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Ejecutar tests (perfil test → H2, sin MySQL)
        working-directory: APIZum/APIZum
        run: ./gradlew test --no-daemon
        # Los tests usan application-test.properties con H2 en memoria

      - name: Publicar informe de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: APIZum/APIZum/build/reports/tests/test/


  # ───────────────────────────────────────────────
  # JOB 2 — Build y push de imágenes Docker
  #          Solo en push a main (no en PRs)
  # ───────────────────────────────────────────────
  docker-push:
    name: Docker — Build & Push a Docker Hub
    runs-on: ubuntu-latest
    needs: backend-tests          # solo si los tests pasan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Generar claves RSA (embebidas en la imagen de CI)
        run: |
          mkdir -p APIZum/APIZum/src/main/resources/certs
          openssl genrsa -out private_key.pem 2048
          openssl rsa -in private_key.pem -pubout -out public_key.pem
          openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt \
            -in private_key.pem \
            -out APIZum/APIZum/src/main/resources/certs/private.pem
          cp public_key.pem APIZum/APIZum/src/main/resources/certs/public.pem

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push — Backend
        uses: docker/build-push-action@v5
        with:
          context: ./APIZum/APIZum
          push: true
          tags: |
            fmuncar/apizum-backend:latest
            fmuncar/apizum-backend:${{ github.sha }}

      - name: Build y push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./APIZumCliente
          push: true
          build-args: |
            VITE_API_URL=https://apizum-production.up.railway.app
          tags: |
            fmuncar/apizum-frontend:latest
            fmuncar/apizum-frontend:${{ github.sha }}
