# ══════════════════════════════════════════════════════════════════
# nginx.conf — Configuración del servidor web para el frontend
# ══════════════════════════════════════════════════════════════════
#
# Este archivo reemplaza la configuración por defecto de Nginx.
#
#   1. Vue Router (history mode)
#      En modo HTML5 history, las rutas como /perfil o /transacciones
#      no son archivos reales: el navegador las pide al servidor y Nginx
#      devuelve siempre index.html para que Vue Router las gestione.
#
#   2. Proxy inverso /api → backend
#      Reproduce el comportamiento del proxy de Vite en desarrollo:
#      /api/auth/login → http://backend:8081/auth/login
#      (el prefijo /api se elimina antes de reenviar la petición)
#
# ══════════════════════════════════════════════════════════════════

server {
    # Puerto estándar HTTP
    listen 80;


    # Archivos estáticos
    location / {
        # Directorio donde Vite deposita el build de producción
        root /usr/share/nginx/html;
        index index.html;

        # Si el archivo/directorio no existe, devuelve index.html
        # para que Vue Router gestione la ruta en el cliente.
        try_files $uri $uri/ /index.html;
    }

    # El frontend llama al backend directamente via VITE_API_URL (baked en build).
    # No se necesita proxy en producción (Render/Railway).
    # El bloque /api/ solo aplica en docker-compose local donde backend es accesible.
}
