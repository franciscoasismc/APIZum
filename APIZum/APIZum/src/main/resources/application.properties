spring.application.name=APIZum

# Configuración para el acceso a la Base de Datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.show-sql=true

# Puerto donde escucha el servidor una vez se inicie
server.port=8081

# Configuración de claves RSA
rsa.private-key=classpath:certs/private.pem
rsa.public-key=classpath:certs/public.pem

# Datos de conexión con la base de datos MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:apizumbd}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}

# CORS: orígenes permitidos (separados por coma si hay varios)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2.jwt=DEBUG
logging.level.org.springframework.web=DEBUG