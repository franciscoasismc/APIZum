spring.application.name=APIZum

# Inicialización lazy: los beans se crean cuando se necesitan, no al arrancar.
# Reduce el tiempo de startup significativamente en entornos con poca RAM.
spring.main.lazy-initialization=true

# Configuración para el acceso a la Base de Datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.show-sql=true

# Puerto donde escucha el servidor una vez se inicie
server.port=8081

# Configuración de claves RSA
rsa.private-key=classpath:certs/private.pem
rsa.public-key=classpath:certs/public.pem

# Datos de conexión con la base de datos MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/apizumbd}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# CORS: orígenes permitidos (separados por coma si hay varios)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2.jwt=DEBUG
logging.level.org.springframework.web=DEBUG

# OpenAPI / Swagger UI (disponible en http://localhost:8081/swagger-ui.html)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method